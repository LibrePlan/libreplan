<h1 class="title">Descrizione del lavoro in subappalto</h1>

<p>Sebbene sia possibile lasciare questo campo vuoto, farlo può causare errori nella funzionalità di comunicazione quando esistono più campi vuoti.</p>
<p>Pertanto, si raccomanda vivamente di utilizzare sempre una descrizione del lavoro univoca.</p>
