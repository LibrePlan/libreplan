<h1 class="title">Descripció del treball del subcontractista</h1>

<p>Tot i que és possible deixar aquest camp buit, fer-ho pot provocar errors en la funcionalitat de comunicació quan existeixen múltiples camps buits.</p>
<p>Per tant, recomanem fermament usar sempre una descripció de treball única.</p>
