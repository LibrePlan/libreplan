<h1 class="title">Beschreibung der Unterauftragnehmerarbeit</h1>

<p>Obwohl es möglich ist, dieses Feld leer zu lassen, kann dies zu Fehlern in der Kommunikationsfunktion führen, wenn mehrere leere Felder vorhanden sind.</p>
<p>Daher empfehlen wir dringend, stets eine eindeutige Arbeitsbeschreibung zu verwenden.</p>
