<h1 class="title">Arbeidsbeskrivelse for underleverandør</h1>

<p>Selv om det er mulig å la dette feltet stå tomt, kan dette føre til feil i kommunikasjonsfunksjonaliteten når det finnes flere tomme felt.</p>
<p>Derfor anbefaler vi sterkt alltid å bruke en unik arbeidsbeskrivelse.</p>
