<h1 class="title">توضیحات کار پیمانکار فرعی</h1>

<p>در حالی که می‌توان این فیلد را خالی گذاشت، انجام این کار می‌تواند هنگامی که چندین فیلد خالی وجود دارد منجر به خطا در عملکرد ارتباطات شود.</p>
<p>بنابراین، ما اکیداً توصیه می‌کنیم همیشه از یک توضیح کار منحصربه‌فرد استفاده کنید.</p>
